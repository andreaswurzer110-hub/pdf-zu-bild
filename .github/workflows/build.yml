# Baut die App in der GitHub-Cloud – so bekommst du eine Linux- und Android-Version,
# ohne selbst einen Linux-Rechner zu brauchen.
#
# AUSLÖSER
#   - "Run workflow" (manuell, Tab "Actions") → baut Linux + Android
#   - Push auf master / Tag vX.Y.Z → baut automatisch
#
# ERGEBNIS
#   - Unter dem Workflow-Lauf hängen die Artefakte:
#       * pdf-zu-bild-linux  → .tar.gz mit der Linux-App (entpacken, ./pdf_zu_bild starten)
#       * pdf-zu-bild-android → app-release.apk (auf dem Handy installieren)
#   Artefakte oben rechts beim Lauf herunterladen.

name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.44.4

jobs:
  # ----------------------------------------------------------------- Linux
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Linux-Build-Abhängigkeiten
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Abhängigkeiten holen
        run: flutter pub get

      - name: Linux bauen
        run: |
          flutter config --enable-linux-desktop
          flutter build linux --release

      - name: Als .tar.gz packen
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/pdf-zu-bild-linux-x64.tar.gz" .

      - name: Linux-Artefakt anhängen
        uses: actions/upload-artifact@v4
        with:
          name: pdf-zu-bild-linux
          path: pdf-zu-bild-linux-x64.tar.gz

  # Android & Windows werden lokal gebaut (siehe README). Der Store-Upload
  # (Play/MS Store/Snap) wird separat eingerichtet, wenn der App-Kern steht.
